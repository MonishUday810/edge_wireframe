<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperTeacherEDGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --wine-red: #A41034;
            --amber-orange: #F49138;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FBF9F7;
            color: #1C1917;
            overflow-x: hidden;
        }

        .bg-wine {
            background-color: var(--wine-red);
        }

        .text-wine {
            color: var(--wine-red);
        }

        .border-wine-5 {
            border-color: rgba(123, 3, 35, 0.05);
        }

        .bg-amber-light {
            background-color: rgba(244, 145, 56, 0.05);
        }

        .nav-button.active {
            background-color: white;
            color: var(--wine-red);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .focus-ring:focus-visible {
            outline: 3px solid rgba(244, 145, 56, 0.45);
            outline-offset: 3px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .orb {
            position: fixed;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.04;
            pointer-events: none;
        }

        .pill-nav-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .profile-menu {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .profile-menu.hidden {
            display: block;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px);
        }

        .profile-menu-item:hover {
            background-color: #F8F5F2;
        }

        .profile-menu-item.sign-out:hover {
            background-color: #FDF0F2;
        }

        /* Cinematic overlay for full-card images */
        .hero-gradient-overlay {
            background: linear-gradient(75deg, rgb(0 0 0 / 0.78) 0%, rgb(0 0 0 / 0.54) 42%, rgb(0 0 0 / 0) 100%);
        }

        .card-shadow {
            box-shadow: none;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .today-fade-in {
            animation: fade-in 0.8s ease-out forwards;
        }

        .subject-card {
            isolation: isolate;
            box-shadow: none;
        }

        .subject-card:hover {
            border-color: color-mix(in srgb, var(--subject-accent, #A41034) 22%, transparent);
            box-shadow: none;
        }

        .subject-illustration {
            filter: drop-shadow(0 18px 24px color-mix(in srgb, var(--subject-accent, #A41034) 12%, transparent));
        }

        .subject-icon-image {
            filter: saturate(0.82) contrast(0.9) brightness(1.08) drop-shadow(0 12px 18px color-mix(in srgb, var(--subject-accent, #A41034) 8%, transparent));
        }

        .blocks-page-header {
            position: relative;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.94) 7%, rgba(255, 255, 255, 0.94) 93%, rgba(255, 255, 255, 0));
            box-shadow: 0 14px 34px rgba(28, 25, 23, 0.035);
        }

        .blocks-page-header::after {
            content: "";
            position: absolute;
            right: 0;
            bottom: 0;
            left: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(233, 221, 217, 0.95) 8%, rgba(233, 221, 217, 0.95) 92%, transparent);
            pointer-events: none;
        }

        .block-card {
            --block-card-pad-x: 1.25rem;
            --block-card-pad-y: 1.25rem;
            background: #FFFFFF;
            border: 0;
            box-shadow: none;
            transition: none;
        }

        .block-card:hover {
            border-color: transparent;
            box-shadow: none;
        }

        .block-image-badge {
            background: #FFFFFF;
            border: 0;
            box-shadow: none;
        }

        .block-image-badge img {
            filter: none;
        }

        .block-image-badge-number {
            background: var(--block-accent, #A41034);
            box-shadow: 0 7px 16px color-mix(in srgb, var(--block-accent, #A41034) 26%, transparent);
        }

        .block-toggle-icon {
            position: static;
            z-index: 3;
            display: grid;
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            place-items: center;
            border-radius: 999px;
            background: #F9FAFB;
            color: #A41034;
            border: 1px solid #E5E7EB;
            box-shadow: none;
            transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
        }

        .block-header-sticky:hover .block-toggle-icon {
            background: #FFFFFF;
            border-color: #D1D5DB;
            box-shadow: none;
        }

        .block-toggle-icon svg {
            transition: transform 200ms ease;
        }

        .block-header-sticky[aria-expanded="true"] .block-toggle-icon svg {
            transform: rotate(180deg);
        }

        .block-header-actions {
            width: 100%;
            max-width: 14rem;
            flex: 1 1 12rem;
        }

        .block-header-sticky {
            width: 100%;
            margin: 0;
            border-radius: 0;
            border-bottom: 0;
            position: sticky;
            padding: 0;
            background: #FFFFFF;
            box-shadow: none;
        }

        .block-header-control {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .block-card {
                --block-card-pad-x: 1.5rem;
                --block-card-pad-y: 1.5rem;
            }

            .block-header-sticky {
                align-items: center;
                padding: 0;
            }

            .block-header-actions {
                position: static;
                width: 12rem;
                flex: 0 0 12rem;
                transform: none;
            }

            .block-header-control {
                width: auto;
                align-self: center;
                justify-content: flex-end;
            }
        }

        .block-card.is-collapsed {
            overflow: hidden;
        }

        .block-card.is-collapsed .block-header-sticky {
            width: 100%;
            margin: 0;
            border-radius: 0;
            border-bottom: 0;
        }

        .block-card.is-collapsed .block-header-actions {
            transform: none;
        }

        .tab-panel[data-tab-panel="Communication"],
        .tab-panel[data-tab-panel="Learnometer"],
        .tab-panel[data-tab-panel="Practice Test"] {
            font-family: 'Inter', sans-serif;
            letter-spacing: 0;
        }

        .tab-panel[data-tab-panel="Communication"] .font-black,
        .tab-panel[data-tab-panel="Learnometer"] .font-black,
        .tab-panel[data-tab-panel="Practice Test"] .font-black {
            font-weight: 700 !important;
        }

        .tab-panel[data-tab-panel="Communication"] .tracking-tight,
        .tab-panel[data-tab-panel="Communication"] .tracking-wider,
        .tab-panel[data-tab-panel="Communication"] .tracking-widest,
        .tab-panel[data-tab-panel="Learnometer"] .tracking-tight,
        .tab-panel[data-tab-panel="Learnometer"] .tracking-wider,
        .tab-panel[data-tab-panel="Learnometer"] .tracking-widest,
        .tab-panel[data-tab-panel="Practice Test"] .tracking-tight,
        .tab-panel[data-tab-panel="Practice Test"] .tracking-wider,
        .tab-panel[data-tab-panel="Practice Test"] .tracking-widest {
            letter-spacing: 0 !important;
        }

        .tab-panel[data-tab-panel="Communication"] h1,
        .tab-panel[data-tab-panel="Communication"] h2,
        .tab-panel[data-tab-panel="Learnometer"] h1,
        .tab-panel[data-tab-panel="Learnometer"] h2,
        .tab-panel[data-tab-panel="Practice Test"] h1,
        .tab-panel[data-tab-panel="Practice Test"] h2 {
            font-weight: 700;
            letter-spacing: 0;
        }

        .communication-title {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 600 !important;
            letter-spacing: -0.3px !important;
        }

        .communication-card-title {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600 !important;
            letter-spacing: 0;
        }

        .communication-meta {
            color: #8B8B8B;
            font-size: 12px;
            font-weight: 500 !important;
            letter-spacing: 0.2px !important;
        }

        .communication-content-text {
            color: #2C2C2C;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .communication-content-text:last-child {
            margin-bottom: 0;
        }

        .communication-action {
            font-size: 13px;
            font-weight: 600 !important;
            letter-spacing: 0.3px !important;
        }

        .communication-avatar {
            font-size: 13px;
            font-weight: 600 !important;
            letter-spacing: 0;
        }

        .lesson-journey-shell {
            zoom: 0.8;
            background:
                radial-gradient(circle at 78% 18%, rgba(177, 15, 58, 0.08), transparent 28rem),
                linear-gradient(180deg, #FBF8F6 0%, #FFFDFC 48%, #FBF8F6 100%);
        }

        .lesson-block {
            --timeline-progress: 0%;
            --timeline-x: 28px;
            --timeline-node-size: 36px;
            isolation: isolate;
        }

        .lesson-block::before,
        .lesson-block::after {
            content: "";
            position: absolute;
            left: calc(var(--timeline-x) - 1.5px);
            top: 0;
            z-index: 0;
            width: 3px;
            border-radius: 999px;
            pointer-events: none;
        }

        .lesson-block::before {
            bottom: 0;
            background: rgba(120, 120, 120, 0.16);
        }

        .lesson-block::after {
            height: var(--timeline-progress);
            background: linear-gradient(180deg, #8F0B2E 0%, #B10F3A 54%, #D65A70 100%);
            box-shadow: 0 0 18px rgba(177, 15, 58, 0.13);
            animation: timeline-grow 900ms cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .lesson-session {
            isolation: isolate;
            z-index: 1;
            border-radius: 26px;
            padding: 1rem;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(255, 252, 249, 0.78)),
                rgba(255, 250, 246, 0.72);
            box-shadow: 0 16px 40px rgba(28, 25, 23, 0.055);
            animation: session-rise 420ms cubic-bezier(0.22, 1, 0.36, 1) both;
            transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
        }

        .lesson-session::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            border-radius: 26px;
            background: transparent;
            opacity: 0;
            transition: background 200ms ease, box-shadow 200ms ease, opacity 200ms ease;
        }

        .lesson-session:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 52px rgba(28, 25, 23, 0.075);
        }

        .lesson-session.is-active::before {
            background: linear-gradient(90deg, rgba(177, 15, 58, 0.075), rgba(255, 255, 255, 0.68) 76%, rgba(255, 255, 255, 0.18));
            box-shadow: inset 0 0 0 1px rgba(177, 15, 58, 0.08);
            opacity: 1;
        }

        .lesson-session:hover::before {
            background: rgba(255, 255, 255, 0.42);
            box-shadow: 0 14px 34px rgba(28, 25, 23, 0.05);
            opacity: 1;
        }

        .lesson-session.is-active:hover::before {
            background: linear-gradient(90deg, rgba(177, 15, 58, 0.075), rgba(255, 255, 255, 0.82) 76%, rgba(255, 255, 255, 0.24));
            box-shadow: 0 20px 46px rgba(28, 25, 23, 0.075);
        }

        .timeline-node-wrap {
            position: absolute;
            left: calc(var(--timeline-x) - 84px);
            top: 92px;
            z-index: 2;
            display: grid;
            width: var(--timeline-node-size);
            height: var(--timeline-node-size);
            place-items: center;
        }

        .timeline-node-wrap::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 999px;
            /* background: rgba(255, 253, 252, 0.92); */
            /* box-shadow: 0 0 0 5px rgba(255, 253, 252, 0.88); */
        }

        .timeline-node {
            position: relative;
            z-index: 2;
            display: grid;
            place-items: center;
            border-radius: 999px;
            animation: node-bloom 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .timeline-node.completed {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #8F0B2E, #B10F3A 58%, #D65A70);
            color: white;
            box-shadow: 0 0 0 6px rgba(177, 15, 58, 0.08), 0 10px 20px rgba(177, 15, 58, 0.16);
        }

        .timeline-node.progress {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #B10F3A, #DF6B7F);
            box-shadow: 0 0 0 7px rgba(177, 15, 58, 0.10), 0 12px 24px rgba(177, 15, 58, 0.16);
        }

        .timeline-node.progress::after {
            content: "";
            position: absolute;
            inset: -10px;
            border-radius: inherit;
            border: 1px solid rgba(177, 15, 58, 0.32);
            opacity: 0.72;
            animation: pulse-ring 1600ms ease-out infinite;
        }

        .timeline-node.not-started {
            width: 20px;
            height: 20px;
            background: rgba(255, 253, 252, 0.96);
            border: 2px solid rgba(140, 123, 119, 0.25);
            box-shadow: 0 0 0 5px rgba(255, 253, 252, 0.9);
            opacity: 0.82;
        }

        .lesson-image-wrap {
            box-shadow: none;
        }

        .lesson-detail-shell {
            background: transparent;
        }

        .lesson-detail-title {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 0;
        }

        .edge-gold-panel {
            background: linear-gradient(135deg, #f7b84b 0%, #f39a2f 100%);
        }

        .lesson-action-arrow {
            opacity: 0.62;
            transition: transform 200ms ease, opacity 200ms ease;
        }

        .lesson-session:hover .lesson-action-arrow {
            transform: translateX(3px);
            opacity: 1;
        }

        @keyframes timeline-grow {
            from {
                height: 0;
            }
        }

        @keyframes node-bloom {
            from {
                opacity: 0;
                transform: scale(0.72);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes session-rise {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-ring {
            0% {
                opacity: 0.5;
                transform: scale(0.82);
            }

            100% {
                opacity: 0;
                transform: scale(1.36);
            }
        }

        @media (min-width: 768px) {
            .timeline-node-wrap {
                top: 50%;
                transform: translateY(-50%);
            }
        }

        @media (max-width: 767px) {
            .lesson-block {
                --timeline-x: 18px;
                --timeline-node-size: 32px;
            }

            .lesson-block::before,
            .lesson-block::after {
                left: calc(var(--timeline-x) - 1.5px);
            }

            .timeline-node-wrap {
                left: calc(var(--timeline-x) - 65px);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ── LESSON PLAN 5A LAYOUT ── */
        .lp-title-strip {
            background: #A41034;
            padding: 24px 0 20px;
            margin: -1.5rem -1.5rem 0;
        }
        @media (min-width: 768px) {
            .lp-title-strip { margin: -2rem -3rem 0; }
        }
        .lp-title-strip-inner {
            max-width: 1040px;
            margin: 0 auto;
            padding: 0 28px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }
        .lp-eyebrow {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.78);
            margin-bottom: 5px;
            white-space: nowrap;
        }
        .lp-title {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        .lp-chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .lp-chip {
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.20);
            color: rgba(255,255,255,0.88);
            font-size: 11px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .lp-hero-figure {
            max-width: 1040px;
            margin: 24px auto 0;
            padding: 0 28px;
        }
        .lp-hero-figure img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 360px;
            object-fit: cover;
            overflow: hidden;
            border-radius: 18px;
            border: 1px solid rgba(28,20,22,0.08);
            background: #f6f1ee;
        }

        /* Section cards */
        .lp-section-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .lp-section-card {
            background: #fcfaf8;
            border-radius: 22px;
            box-shadow: none;
            overflow: hidden;
            border: 1px solid #ece4de;
        }
        .lp-section-heading {
            position: relative;
            display: grid;
            align-items: center;
            min-height: 82px;
            padding: 0 2px;
            user-select: none;
            text-align: left;
        }
        .lp-section-heading-copy {
            position: relative;
            display: flex;
            align-items: center;
            min-height: 82px;
            min-width: 0;
            width: 100%;
        }
        .lp-sec-num {
            display: none;
        }
        .lp-sec-heading-line {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            min-width: 0;
        }
        .lp-sec-rule {
            height: 1px;
            flex: 1 1 auto;
            background: linear-gradient(90deg, rgba(164,16,52,0.22), rgba(164,16,52,0.04));
        }
        .lp-sec-title {
            position: relative;
            z-index: 1;
            padding-left: 0;
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 29px;
            font-weight: 900;
            color: #271f1d;
            letter-spacing: -0.05em;
            line-height: 1;
            text-transform: uppercase;
            min-width: 0;
        }
        .lp-sec-meta {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 11px;
            color: #8b7a74;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .lp-section-body { padding: 22px 24px; }
        .lp-lesson-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            align-items: start;
        }
        .lp-section-flow {
            display: flex;
            flex-direction: column;
            gap: 26px;
            min-width: 0;
        }
        /* Sub labels */
        .lp-sub-lbl {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 12px; font-weight: 700;
            letter-spacing: 0.10em; text-transform: uppercase;
            color: #94857d; margin-bottom: 10px;
        }
        .lp-sub-lbl.accent { color: #6f625d; }

        /* Divider */
        .lp-divider { height: 1px; background: #F0EAE6; margin: 20px 0; }

        /* Aim content */
        .lp-aim-statement {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #1C1917;
            line-height: 1.45;
            letter-spacing: -0.01em;
            margin-bottom: 12px;
        }
        .lp-aim-context {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: #5C524E;
            line-height: 1.7;
            padding: 13px 17px;
            background: rgba(164,16,52,0.05);
            border: 1px solid rgba(164,16,52,0.12);
            border-radius: 14px;
            margin-bottom: 18px;
        }
        .lp-aim-support-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
            gap: 14px;
        }
        .lp-support-panel {
            border: 1px solid #efe5de;
            border-radius: 18px;
            background: #fdf8f4;
            padding: 14px 16px 16px;
        }
        .lp-support-note {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            line-height: 1.6;
            color: #7d6f69;
            margin: -2px 0 12px;
        }

        /* Big numbered steps */
        .lp-steps { display: flex; flex-direction: column; }
        .lp-step-row {
            display: grid;
            grid-template-columns: 52px 1fr;
            gap: 4px;
            padding: 14px 16px;
            align-items: flex-start;
            border: 1px solid #F0EAE6;
            border-radius: 14px;
            background: #FFFFFF;
        }
        .lp-step-row + .lp-step-row {
            margin-top: 10px;
        }
        .lp-step-big-num {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: rgba(164,16,52,0.16);
            line-height: 1;
            padding-top: 4px;
        }
        .lp-step-label {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #5f3127;
            margin-bottom: 6px;
        }
        .lp-step-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px; color: #3A2D2A; line-height: 1.65;
        }
        .lp-action-kicker {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 11px;
            letter-spacing: 0.14em;
            color: #8A7978;
            margin-bottom: 12px;
        }
        .lp-inline-figure {
            margin: 18px 0 0;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid #E7E5E4;
            background: #F8F7F5;
            box-shadow: none;
        }
        .lp-inline-figure img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        /* Vocabulary */
        .lp-vocab-shell {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .lp-vocab-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .lp-vocab-trigger {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            border-radius: 12px;
            border: 1px solid #e7dbd4;
            background: #f8f2ed;
            cursor: pointer;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 800;
            color: #5f3127;
            transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
        }
        .lp-vocab-trigger:hover {
            background: #f2e7de;
        }
        .lp-vocab-trigger.is-active {
            background: #efe0d6;
            border-color: #d7c4b8;
            color: #3d2823;
        }
        .lp-vocab-panel {
            border-radius: 12px;
            border: 1px solid #e7dbd4;
            background: #fffdfb;
            padding: 12px 14px;
        }
        .lp-vocab-definition {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: #5C524E;
            line-height: 1.6;
        }

        /* Tip boxes */
        .lp-tip-box {
            display: flex; gap: 11px; align-items: flex-start;
            padding: 13px 15px; border-radius: 10px;
            background: rgba(164,16,52,0.18); border: 1px solid rgba(164,16,52,0.32);
            margin-top: 16px;
        }
        .lp-tip-box.parent { background: #F3F7FF; border-color: #BAD0F5; }
        .lp-tip-box + .lp-tip-box { margin-top: 9px; }
        .lp-tip-lbl {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 10.5px; font-weight: 800;
            letter-spacing: 0.10em; text-transform: uppercase;
            color: #A41034; margin-bottom: 3px;
        }
        .lp-tip-txt { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14.5px; color: #3A2D2A; line-height: 1.65; }

        /* Analysis */
        .lp-analysis-layout {
            display: grid;
            grid-template-columns: minmax(0, 0.88fr) minmax(0, 1.12fr);
            gap: 16px;
            align-items: start;
        }
        .lp-analysis-layout > :only-child {
            grid-column: 1 / -1;
        }
        .lp-analysis-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .lp-analysis-block + .lp-analysis-block {
            margin-top: 20px;
        }
        .lp-analysis-block {
            border-radius: 18px;
            border: 1px solid #ece4de;
            background: #fffdfb;
            padding: 16px;
        }
        .lp-analysis-question {
            margin-bottom: 12px;
            padding: 15px 16px;
            border-radius: 14px;
            background: rgba(164,16,52,0.09);
            border: 1px solid rgba(164,16,52,0.18);
        }
        .lp-analysis-question-lbl {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 10.5px;
            font-weight: 800;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            color: #A41034;
            margin-bottom: 7px;
        }
        .lp-analysis-question-text {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #5a0219;
            line-height: 1.5;
        }
        .lp-analysis-answer {
            background: #fbf8f5;
            border: 1px solid #ede5df;
            border-radius: 14px;
            padding: 16px 18px;
        }
        .lp-analysis-answer p {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14.5px;
            color: #3A2D2A;
            line-height: 1.65;
            margin: 0;
        }
        .lp-analysis-answer p + p {
            margin-top: 10px;
        }

        /* Differentiation */
        .lp-diff-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .lp-diff-col { background: #FBF9F7; border: 1px solid #EDE8E4; border-radius: 10px; padding: 16px 18px; }
        .lp-diff-col-lbl {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 13px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
            color: #5f3127; margin-bottom: 10px; padding-bottom: 7px;
            border-bottom: 2px solid rgba(95,49,39,0.12);
        }
        .lp-diff-items { display: flex; flex-direction: column; gap: 8px; }
        .lp-diff-item { font-family: 'Plus Jakarta Sans', sans-serif; display: flex; gap: 7px; font-size: 14px; color: #3A2D2A; line-height: 1.55; }
        .lp-diff-dot { width: 5px; height: 5px; background: #b6805d; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
        .lp-practice-intro {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: #5C524E;
            line-height: 1.7;
            margin: 0 0 18px;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #ece4de;
            background: #fffdfb;
        }
        .lp-homework-box {
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #ece4de;
            background: #fffdfb;
        }
        .lp-homework-box p {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: #5C524E;
            line-height: 1.65;
            margin: 0;
        }

        /* Outcomes */
        .lp-outcomes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .lp-outcome-card { border-radius: 12px; padding: 16px 18px; display: flex; flex-direction: column; gap: 5px; }
        .lp-outcome-card.approaching { background: #f8f1e4; border: 1px solid #ead6a5; }
        .lp-outcome-card.meeting     { background: #eef5ed; border: 1px solid #b9d4bf; }
        .lp-outcome-card.exceeding   { background: #f1f3f8; border: 1px solid #c6d0e2; }
        .lp-outcome-level { font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif; font-size: 10.5px; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase; }
        .approaching .lp-outcome-level { color: #92400E; }
        .meeting     .lp-outcome-level { color: #065F46; }
        .exceeding   .lp-outcome-level { color: #1E40AF; }
        .lp-outcome-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; color: #3A2D2A; line-height: 1.6; }

        /* Resource list */
        .lp-resource-list { display: flex; flex-direction: column; gap: 1px; }
        .lp-resource-row {
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; align-items: center; gap: 9px;
            padding: 8px 0;
            font-size: 14.5px; color: #3A2D2A;
            border-bottom: 1px solid #f2ece7;
        }
        .lp-resource-row:last-child { border-bottom: 0; }
        .lp-res-index {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            width: 22px;
            flex: 0 0 22px;
            font-size: 12px;
            font-weight: 800;
            color: #8c5b4c;
        }
        .lp-complete-wrap {
            display: flex;
            justify-content: center;
            margin-top: 26px;
        }
        .lp-complete-card {
            width: min(100%, 460px);
            padding: 18px 20px 20px;
            border-radius: 18px;
            border: 1px solid #eadfd7;
            background: #fffdfb;
            text-align: center;
        }
        .lp-complete-label {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #8f7f79;
            margin-bottom: 8px;
        }
        .lp-complete-title {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: 20px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.03em;
            color: #271f1d;
            margin-bottom: 8px;
        }
        .lp-complete-status {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            line-height: 1.6;
            color: #7d6f69;
            margin-bottom: 14px;
        }
        .lp-complete-slider {
            width: 100%;
            cursor: pointer;
            accent-color: #A41034;
        }
        .lp-complete-card.is-complete {
            border-color: rgba(164,16,52,0.26);
            background: rgba(164,16,52,0.07);
        }
        .lp-complete-card.is-complete .lp-complete-title,
        .lp-complete-card.is-complete .lp-complete-status {
            color: #7a0c26;
        }

        @media (max-width: 640px) {
            .lp-kp-grid, .lp-outcomes-grid, .lp-diff-cols, .lp-aim-support-grid, .lp-analysis-layout { grid-template-columns: 1fr; }
            .lp-section-body { padding: 18px 16px; }
            .lp-section-stack { gap: 5px; }
            .lp-section-heading,
            .lp-section-heading,
            .lp-section-heading-copy { min-height: 72px; }
            .lp-sec-num {
                display: none;
            }
            .lp-sec-meta {
                font-size: 10px;
            }
            .lp-sec-heading-line {
                gap: 10px;
            }
            .lp-sec-title {
                padding-left: 0;
                font-size: 23px;
                letter-spacing: -0.04em;
            }
            .lp-complete-card {
                padding: 16px 16px 18px;
            }
            .lp-complete-title {
                font-size: 18px;
            }
        }

        /* Text overflow resilience */
        .lp-aim-statement, .lp-aim-context, .lp-step-text,
        .lp-tip-txt, .lp-analysis-question-text, .lp-analysis-answer p,
        .lp-diff-item span, .lp-outcome-text {
            overflow-wrap: break-word;
            word-break: break-word;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .lp-vocab-trigger,
            .lp-section-card,
            .lp-section-card * {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }

        /* Alternate lesson detail template */
        .altlp-shell {
            --alt-paper: #FBF9F7;
            --alt-paper-2: #F6F1EE;
            --alt-ink: #1c1416;
            --alt-ink-2: #4a3b3e;
            --alt-ink-3: #7a6b6e;
            --alt-wine-900: #7A0C26;
            --alt-wine-800: #8F0B2E;
            --alt-wine-700: #A41034;
            --alt-wine-100: #F7E8EC;
            --alt-gold: #F49138;
            --alt-rule: rgba(28, 20, 22, 0.12);
            --alt-rule-strong: rgba(28, 20, 22, 0.22);
            background: var(--alt-paper);
            color: var(--alt-ink);
        }
        .altlp-wrap {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 clamp(20px, 4vw, 56px);
        }
        .altlp-topbar {
            position: sticky;
            top: 96px;
            z-index: 25;
            background: color-mix(in oklab, var(--alt-paper) 92%, transparent);
            backdrop-filter: saturate(140%) blur(8px);
            border-bottom: 1px solid var(--alt-rule);
        }
        .altlp-topbar-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 14px clamp(20px, 4vw, 56px);
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .altlp-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 15px;
            color: var(--alt-wine-800);
            letter-spacing: 0.02em;
        }
        .altlp-seal {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--alt-wine-700), var(--alt-wine-900));
        }
        .altlp-brand small {
            color: var(--alt-ink-3);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-left: 4px;
        }
        .altlp-nav {
            margin-left: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }
        .altlp-nav-button {
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            padding: 7px 11px;
            border-radius: 999px;
            color: var(--alt-ink-2);
            letter-spacing: 0.04em;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            border: 0;
            background: transparent;
            cursor: pointer;
            transition: background 120ms ease, color 120ms ease;
        }
        .altlp-nav-button:hover {
            background: rgba(114,47,55,0.06);
            color: var(--alt-wine-800);
        }
        .altlp-nav-button.is-active {
            background: var(--alt-wine-700);
            color: #fff;
        }
        .altlp-nav-num {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--alt-wine-700);
            opacity: 0.8;
        }
        .altlp-nav-button.is-active .altlp-nav-num {
            color: rgba(255,255,255,0.7);
        }
        .altlp-masthead {
            padding: 40px 0;
        }
        .altlp-eyebrow {
            display: flex;
            align-items: center;
            gap: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--alt-wine-700);
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .altlp-eyebrow-main {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }
        .altlp-eyebrow-sep {
            min-width: 24px;
            height: 1px;
            background: var(--alt-rule);
            flex: 1 1 auto;
        }
        .altlp-eyebrow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--alt-wine-700);
        }
        .altlp-eyebrow-meta {
            color: var(--alt-ink-3);
        }
        .altlp-title {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: clamp(34px, 5.6vw, 56px);
            line-height: 1.06;
            letter-spacing: -0.02em;
            margin: 22px 0 0;
            color: var(--alt-ink);
            text-wrap: balance;
        }
        .altlp-title em,
        .altlp-section-name em {
            font-style: normal;
            color: var(--alt-wine-700);
        }
        .altlp-subtitle {
            margin: 22px 0 0;
            max-width: 640px;
            font-size: 16px;
            line-height: 1.65;
            color: var(--alt-ink-2);
        }
        .altlp-section {
            padding: 32px 0 38px;
            scroll-margin-top: 140px;
        }
        .altlp-section-head {
            display: grid;
            gap: 12px;
            margin-bottom: 22px;
        }
        .altlp-section-num {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: clamp(62px, 10vw, 96px);
            line-height: 0.88;
            letter-spacing: -0.04em;
            color: var(--alt-wine-700);
            margin: 0;
            display: flex;
            align-items: baseline;
            gap: 16px;
        }
        .altlp-section-num-value {
            color: rgba(164,16,52,0.88);
        }
        .altlp-section-stripe {
            height: 2px;
            flex: 1;
            background: var(--alt-wine-700);
            align-self: end;
            margin-bottom: 18px;
            opacity: 0.18;
        }
        .altlp-section-duration {
            align-self: end;
            margin-bottom: 18px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--alt-wine-700);
        }
        .altlp-section-name {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(28px, 3.8vw, 40px);
            font-weight: 800;
            letter-spacing: -0.015em;
            margin: 0;
            color: var(--alt-ink);
        }
        .altlp-two-col {
            display: grid;
            grid-template-columns: minmax(0, 1.45fr) minmax(0, 1fr);
            gap: 32px;
        }
        .altlp-prose {
            max-width: 680px;
        }
        .altlp-prose p {
            margin: 0 0 18px;
            color: var(--alt-ink-2);
        }
        .altlp-lead {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(20px, 2.4vw, 24px);
            line-height: 1.4;
            color: var(--alt-ink);
            font-weight: 700;
            letter-spacing: -0.01em;
            margin: 0 0 32px;
            text-wrap: pretty;
        }
        .altlp-pull {
            color: var(--alt-wine-700);
            font-style: normal;
        }
        .altlp-card {
            background: color-mix(in srgb, var(--alt-paper-2) 62%, white);
            border: 1px solid var(--alt-rule);
            padding: 18px 20px;
            border-radius: 14px;
            align-self: start;
        }
        .altlp-card.dark {
            background: var(--alt-wine-900);
            color: #f5e6c8;
            border-color: rgba(122,12,38,0.12);
            border-radius: 16px;
        }
        .altlp-card-eyebrow {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--alt-wine-700);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .altlp-card.dark .altlp-card-eyebrow {
            color: var(--alt-gold);
        }
        .altlp-card-bar {
            width: 18px;
            height: 1px;
            background: currentColor;
        }
        .altlp-card h3 {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 18px;
            margin: 0 0 10px;
            letter-spacing: -0.01em;
            color: var(--alt-ink);
        }
        .altlp-card.dark h3 {
            color: #fff;
        }
        .altlp-glossary dt {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            font-style: normal;
            font-weight: 600;
            color: var(--alt-wine-700);
            font-size: 17px;
            margin-top: 10px;
        }
        .altlp-glossary dt:first-child {
            margin-top: 0;
        }
        .altlp-glossary dd {
            margin: 4px 0 0;
            color: var(--alt-ink-2);
            font-size: 15px;
            line-height: 1.5;
        }
        .altlp-support-note {
            margin: 0;
            color: var(--alt-ink-3);
            font-size: 14px;
            line-height: 1.55;
        }
        .altlp-resource-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 6px;
        }
        .altlp-resource-item {
            display: grid;
            grid-template-columns: 24px 1fr;
            gap: 12px;
            align-items: baseline;
            padding: 8px 0;
            border-bottom: 1px solid rgba(28,20,22,0.08);
            font-size: 14px;
            color: var(--alt-ink-2);
        }
        .altlp-resource-item:last-child {
            border-bottom: none;
        }
        .altlp-resource-ico {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            background: var(--alt-wine-100);
            color: var(--alt-wine-800);
            display: grid;
            place-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
        }
        .altlp-steps {
            list-style: none;
            padding: 0;
            margin: 0 0 32px;
            counter-reset: altstep;
            display: grid;
            gap: 10px;
        }
        .altlp-step {
            counter-increment: altstep;
            display: grid;
            grid-template-columns: 44px 1fr;
            gap: 18px;
            padding: 12px 0;
            border-top: 1px solid var(--alt-rule);
            align-items: baseline;
        }
        .altlp-step:last-child {
            border-bottom: 1px solid var(--alt-rule);
        }
        .altlp-step::before {
            content: counter(altstep, decimal-leading-zero);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--alt-wine-700);
            letter-spacing: 0.06em;
            padding-top: 4px;
        }
        .altlp-step-body {
            color: var(--alt-ink);
            font-size: 15px;
            line-height: 1.55;
        }
        .altlp-step-prompt {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(164,16,52,0.07);
            border: 1px solid rgba(164,16,52,0.12);
        }
        .altlp-step-prompt p {
            margin: 0;
            color: #4a3b3e;
            font-size: 14px;
            line-height: 1.6;
        }
        .altlp-step-think {
            background: #f7f0ef;
            margin: 6px -16px 0;
            padding: 16px;
            border-radius: 14px;
            border-top: 1px solid var(--alt-rule);
        }
        .altlp-step-think::before {
            content: "?";
            font-weight: 700;
        }
        .altlp-think-label {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--alt-wine-700);
            display: block;
            margin-bottom: 6px;
        }

            return String(value)

        function showAppToast(message) {
            const toast = document.getElementById('appToast');
            if (!toast) return;

            toast.textContent = message;
            toast.classList.remove('hidden');
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0');
                toast.classList.add('opacity-100', '-translate-y-1');
            });

            if (appToastTimer) clearTimeout(appToastTimer);
            appToastTimer = setTimeout(() => {
                toast.classList.add('opacity-0');
                toast.classList.remove('opacity-100', '-translate-y-1');

        function audienceMatchesFilter(announcement, filter) {
            if (filter === 'All Grades') return true;
            if (announcement.audience === 'All Grades' || announcement.audience === filter) return true;

            const range = announcement.audience.match(/Grade\s+(\d+)\s*-\s*Grade\s+(\d+)/i);
            const grade = filter.match(/Grade\s+(\d+)/i);
            if (!range || !grade) return false;

            const gradeNumber = Number(grade[1]);
            return gradeNumber >= Number(range[1]) && gradeNumber <= Number(range[2]);
        }

        function bindGroupModalEvents(root) {
            root.querySelectorAll('.close-modal').forEach((button) => button.addEventListener('click', closeCommunicationModal));

                groupDraftName = event.target.value;
                renderGroupModal('groupNameInput');

            root.querySelector('#groupSearchInput')?.addEventListener('input', (event) => {
                groupDraftSearch = event.target.value;
                renderGroupModal('groupSearchInput');
            });
            root.querySelectorAll('.toggle-student').forEach((button) => {
                button.addEventListener('click', () => {
                    const id = Number(button.dataset.studentId);
                    if (groupDraftSelected.has(id)) groupDraftSelected.delete(id);
                    else groupDraftSelected.add(id);
                    renderGroupModal();
                });
            });
            root.querySelectorAll('.toggle-grade').forEach((button) => {
                button.addEventListener('click', () => {
                    const gradeIds = ALL_STUDENTS.filter((student) => student.grade === button.dataset.grade).map((student) => student.id);
                    const allSelected = gradeIds.every((id) => groupDraftSelected.has(id));
                    gradeIds.forEach((id) => allSelected ? groupDraftSelected.delete(id) : groupDraftSelected.add(id));
                    renderGroupModal();
                });
            });
            root.querySelector('#createGroupButton')?.addEventListener('click', () => {
                if (!groupDraftName.trim() || !groupDraftSelected.size) return;
                communicationGroups.push({
                    name: groupDraftName.trim(),
                    members: ALL_STUDENTS.filter((student) => groupDraftSelected.has(student.id))
                });

                    communicationReturnModal = null;
                    communicationModal = 'compose-announcement';

                    renderCommunicationComposer();

            root.querySelectorAll('.cancel-delete').forEach((button) => {
                button.addEventListener('click', () => {
                    manageConfirmDelete = null;
                    renderManageGroupsModal();

            root.querySelectorAll('.confirm-delete').forEach((button) => {
                button.addEventListener('click', () => {
                    const index = communicationGroups.findIndex((group) => group.name === button.dataset.group);
                    if (index >= 0) communicationGroups.splice(index, 1);
                    manageExpandedGroup = null;
                    manageConfirmDelete = null;
                    renderManageGroupsModal();
                    renderCommunicationComposer();
                });

            lucide.createIcons();

        function renderCommunicationFeed() {
            const feed = document.getElementById('communicationFeed');
            const filter = communicationFilter;
            if (!feed) return;

            const query = communicationSearchQuery.trim().toLowerCase();
            const filtered = initialAnnouncements.filter((announcement) => {
                if (!audienceMatchesFilter(announcement, filter)) return false;
                if (!query) return true;
                return [
                    announcement.author,
                    announcement.role,
                    announcement.timestamp,
                    announcement.audience,
                    announcement.text
                ].some((value) => String(value || '').toLowerCase().includes(query));
            });
            feed.innerHTML = filtered.length
                ? filtered.map(renderAnnouncementCard).join('')
                : '<div class="rounded-3xl bg-white p-10 text-center text-sm font-semibold text-[#78716C] ring-1 ring-[#E7E5E4]/80">No announcements found.</div>';

            feed.querySelectorAll('.reaction-button').forEach((button) => {
                button.addEventListener('click', () => {
                    const post = initialAnnouncements.find((announcement) => announcement.id === Number(button.dataset.postId));
                    if (!post) return;
                    if (post.myReactions.has(button.dataset.emoji)) {
                        post.myReactions.delete(button.dataset.emoji);
                    } else {
                        post.myReactions.add(button.dataset.emoji);
                    }
                    renderCommunicationFeed();
                    lucide.createIcons();
                });
            });
            feed.querySelectorAll('[data-image-preview-src]').forEach((button) => {
                button.addEventListener('click', () => {
                    openImageLightbox(button.dataset.imagePreviewSrc, button.dataset.imagePreviewAlt || '');
                });
            });
        }

            if (filter === 'All Grades') return 'All';

            const grade = filter.match(/Grade\s+(\d+)/i);
            return grade ? `G${grade[1]}` : filter;
        }

            searchInput.addEventListener('input', () => {

            });
        }

        function openNewAnnouncement() {

            renderCommunicationComposer();

            renderManageGroupsModal();
        }

        function renderCommunicationFab() {
            const root = document.getElementById('communicationFabRoot');
            if (!root) return;

            root.classList.toggle('hidden', activeAppTab !== 'Communication');
            if (activeAppTab !== 'Communication') {

            root.innerHTML = `

        const LEARNOMETER_TEST = {
            name: 'Mathematics Unit Assessment',
            subject: 'Mathematics',
            grade: 'Grade 4',
            block: 'Block 03 - Fractions',

        const LEARNOMETER_QUESTIONS = [

            { text: 'Which fraction is equivalent to 1/2?', options: ['2/4', '1/4', '3/4', '2/3'], answer: 0 },
            { text: 'What is 1/4 + 1/4?', options: ['2/4', '2/8', '1/8', '4/1'], answer: 0 },
            { text: 'Which of these fractions is the largest?', options: ['3/4', '1/2', '1/4', '2/5'], answer: 0 },
            { text: 'A pizza is cut into 6 equal slices. You eat 2. What fraction of the pizza remains?', options: ['4/6', '2/6', '6/4', '2/3'], answer: 0 },
            { text: 'What is 3/4 of 8?', options: ['6', '4', '3', '2'], answer: 0 },

        const learnometerState = {

        function learnometerLogo(size = 26) {
            return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="#f59138" stroke="#f59138" stroke-width="1.5" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg>`;
        }

        function formatLearnometerTime(secs) {
            const minutes = Math.floor(secs / 60).toString().padStart(2, '0');
            const seconds = (secs % 60).toString().padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        function stopLearnometerTimer() {
            if (learnometerState.timer) {
                clearInterval(learnometerState.timer);
                learnometerState.timer = null;
            }
        }

        function startLearnometerTimer() {
            stopLearnometerTimer();
            learnometerState.timer = setInterval(() => {
                if (learnometerState.step !== 'test' || learnometerState.testDone) {
                    stopLearnometerTimer();
                    return;
                }

                if (learnometerState.timeLeft <= 1) {
                    learnometerState.timeLeft = 0;
                    learnometerState.testDone = true;
                    stopLearnometerTimer();
                    renderLearnometer();
                    return;
                }

                learnometerState.timeLeft -= 1;
                const timerNode = document.getElementById('learnometerTimer');
                if (timerNode) timerNode.textContent = formatLearnometerTime(learnometerState.timeLeft);
            }, 1000);
        }

        function startLearnometerTest(type) {
            learnometerState.testType = type;
            learnometerState.currentQ = 0;
            learnometerState.selected = null;
            learnometerState.answers = [];
            learnometerState.timeLeft = LEARNOMETER_TEST.duration * 60;
            learnometerState.testDone = false;
            learnometerState.step = 'test';
            renderLearnometer();
            startLearnometerTimer();
        }

        function completeLearnometerQuestion() {
            learnometerState.answers[learnometerState.currentQ] = learnometerState.selected;

            if (learnometerState.currentQ + 1 >= LEARNOMETER_QUESTIONS.length) {
                learnometerState.testDone = true;
                stopLearnometerTimer();
            } else {
                learnometerState.currentQ += 1;
                learnometerState.selected = null;
            }

            renderLearnometer();
            if (learnometerState.step === 'test' && !learnometerState.testDone) startLearnometerTimer();
        }

        function resetLearnometer() {
            stopLearnometerTimer();
            learnometerState.step = 'login';
            learnometerState.studentId = '';
            learnometerState.teacherCode = '';
            learnometerState.loginError = '';
            learnometerState.testType = null;
            learnometerState.currentQ = 0;
            learnometerState.selected = null;
            learnometerState.answers = [];
            learnometerState.timeLeft = 0;
            learnometerState.testDone = false;
            renderLearnometer();
        }

                                        <i data-lucide="id-card" class="h-4 w-4 shrink-0 text-[#A41034]"></i>
                                        <input id="learnometerStudentId" type="text" value="${escapeHtml(learnometerState.studentId)}" placeholder="e.g. XS-2026-04821" class="w-full bg-transparent text-sm font-medium text-[#1C1917] placeholder-[#B8B2AE] outline-none">
                                    </span>

                                    <label class="mb-2 block text-xs font-medium leading-5 text-[#8B8B8B]">Teacher code</label>
                                    <span class="flex h-[52px] items-center gap-3 rounded-xl border border-[#E5E5E5] bg-[#FAFAFA] px-4 transition-all focus-within:border-[#A41034] focus-within:shadow-[0_0_0_3px_rgba(164,16,52,0.10)]">
                                        <i data-lucide="key-round" class="h-4 w-4 shrink-0 text-[#A41034]"></i>
                                        <input id="learnometerTeacherCode" type="text" value="${escapeHtml(learnometerState.teacherCode)}" placeholder="e.g. TCH-8842" class="w-full bg-transparent text-sm font-medium text-[#1C1917] placeholder-[#B8B2AE] outline-none">
                                    </span>

        function bindLearnometerEvents() {
            const panel = document.getElementById('learnometerPanel');
            if (!panel) return;

            const studentInput = panel.querySelector('#learnometerStudentId');
            const teacherInput = panel.querySelector('#learnometerTeacherCode');
            studentInput?.addEventListener('input', (event) => {
                learnometerState.studentId = event.target.value;
                learnometerState.loginError = '';
                updateLearnometerLoginButton();
            });
            teacherInput?.addEventListener('input', (event) => {
                learnometerState.teacherCode = event.target.value;
                learnometerState.loginError = '';
                updateLearnometerLoginButton();
            });

            panel.querySelector('#learnometerLoginForm')?.addEventListener('submit', (event) => {
                event.preventDefault();
                learnometerState.studentId = document.getElementById('learnometerStudentId')?.value || '';
                learnometerState.teacherCode = document.getElementById('learnometerTeacherCode')?.value || '';
                if (learnometerState.studentId.trim() && learnometerState.teacherCode.trim()) {
                    learnometerState.step = 'select';
                    learnometerState.loginError = '';
                } else {
                    learnometerState.loginError = 'Please enter both your Student ID and Teacher Code.';
                }
                renderLearnometer();
            });

            panel.querySelectorAll('.learnometer-start-test').forEach((button) => {
                button.addEventListener('click', () => startLearnometerTest(button.dataset.testType));
            });
            panel.querySelector('#learnometerSignOut')?.addEventListener('click', resetLearnometer);
            panel.querySelector('#learnometerExitTest')?.addEventListener('click', () => {
                stopLearnometerTimer();
                learnometerState.step = 'select';
                learnometerState.testDone = false;
                renderLearnometer();
            });
            panel.querySelectorAll('.learnometer-option').forEach((button) => {
                button.addEventListener('click', () => {
                    learnometerState.selected = Number(button.dataset.optionIndex);
                    renderLearnometer();
                    if (learnometerState.step === 'test' && !learnometerState.testDone) startLearnometerTimer();
                });
            });
            panel.querySelector('#learnometerNext')?.addEventListener('click', () => {
                if (learnometerState.selected !== null) completeLearnometerQuestion();
            });
            panel.querySelector('#learnometerBackToTest')?.addEventListener('click', () => {
                learnometerState.step = 'select';
                learnometerState.testDone = false;
                renderLearnometer();
            });
            panel.querySelector('#learnometerRetry')?.addEventListener('click', () => {
                startLearnometerTest(learnometerState.testType === 'practice' ? 'test' : 'practice');
            });
        }

                { title: 'Food Chains Quick Test', subject: 'Science', topic: 'Ecosystems', date: 'Apr 29', score: 69, status: 'Completed', action: 'Retry', icon: 'flask-conical' },
                { title: 'Comprehension Drill', subject: 'English', topic: 'Reading', date: 'Apr 28', score: 81, status: 'Completed', action: 'Review', icon: 'book-open' },
                { title: 'Algorithms Starter', subject: 'Computer Science', topic: 'Algorithms', date: 'Apr 25', score: 71, status: 'In Progress', action: 'Resume', icon: 'monitor' },
                { title: 'Vyakaran Practice', subject: 'Hindi', topic: 'Grammar', date: 'Apr 24', score: 76, status: 'Assigned', action: 'Review', icon: 'languages' }
            ]
        };

        function generatePracticeGymQuestions(grade, subject, block, difficulty) {
            const topic = block.includes(': ') ? block.split(': ')[1] : block;
            const sub = subject || 'Science';
            const gr = grade || 'Grade 4';
            const base = [
                {
                    text: `What is the main theme of "${topic}"?`,
                    options: [topic, 'Photosynthesis', 'Gravity', 'Magnetism'],
                    answer: 0
                },
                {
                    text: `"${topic}" is studied as part of which subject in ${gr}?`,
                    options: [sub, 'History', 'Art', 'Music'],
                    answer: 0
                },
                {
                    text: `Which habit helps students retain what they learn in "${topic}"?`,
                    options: ['Regular practice and review', 'Skipping revision', 'Only copying notes', 'Avoiding questions'],
                    answer: 0
                },
                {
                    text: `Which approach best supports learning "${topic}"?`,
                    options: ['Observation and inquiry', 'Memorising without context', 'Guessing answers', 'Ignoring examples'],
                    answer: 0
                },
                {
                    text: `What should a student do when a concept in "${topic}" is unclear?`,
                    options: ['Ask, discuss, and practise', 'Stop trying', 'Copy the answer only', 'Avoid the activity'],
                    answer: 0
                }
            ];
            if (difficulty === 'Hard') {
                base.push({
                    text: `Which best demonstrates mastery of "${topic}"?`,
                    options: ['Applying the idea to a new situation', 'Reading the title only', 'Memorising one phrase', 'Avoiding practice'],
                    answer: 0
                });
            }
            return base;
        }

        function stopPracticeGymTimer() {
            if (practiceGymTimer) {
                clearInterval(practiceGymTimer);
                practiceGymTimer = null;
            }
        }

        function startPracticeGymTimer() {
            stopPracticeGymTimer();
            practiceGymTimer = setInterval(() => {
                if (!practiceGymState.testStarted || practiceGymState.testDone) {
                    stopPracticeGymTimer();
                    return;
                }
                practiceGymState.timeLeft = Math.max(0, practiceGymState.timeLeft - 1);
                if (practiceGymState.timeLeft === 0) {
                    practiceGymState.testDone = true;
                    stopPracticeGymTimer();
                }
                renderPracticeGym();
            }, 1000);
        }

        function resetPracticeGymTest() {
            stopPracticeGymTimer();
            practiceGymState.testStarted = false;
            practiceGymState.testDone = false;
            practiceGymState.questions = [];
            practiceGymState.currentQ = 0;
            practiceGymState.selected = null;
            practiceGymState.answers = [];
            practiceGymState.timeLeft = 0;
            practiceGymState.showSetupPage = false;
        }

        function startPracticeGymTest() {
            practiceGymState.questions = generatePracticeGymQuestions(
                practiceGymState.grade,
                practiceGymState.subject,
                practiceGymState.block,
                practiceGymState.difficulty
            );
            practiceGymState.currentQ = 0;
            practiceGymState.selected = null;
            practiceGymState.answers = [];
            practiceGymState.timeLeft = practiceGymState.timeLimit * 60;
            practiceGymState.testStarted = true;
            practiceGymState.testDone = false;
            renderPracticeGym();
            startPracticeGymTimer();
        }

        function formatGymTime(seconds) {
            const minutes = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            return `${minutes}:${secs}`;
        }

        function bindPracticeGymEvents() {
            const root = document.getElementById('practiceGymRoot');
            if (!root) return;
            root.querySelectorAll('[data-practice-subject]').forEach((button) => {
                button.addEventListener('click', () => {
                    practiceGymState.selectedReviewSubject = button.dataset.practiceSubject || 'Mathematics';
                    practiceGymState.selectedCalendarDay = null;
                    renderPracticeGym();
                });
            });
            root.querySelectorAll('[data-practice-start]').forEach((button) => {
                button.addEventListener('click', () => {
                    const weakTopic = getPracticeSubjectData().weakTopics[0]?.topic || '';
                    openPracticeSetup(getPracticeSelectedSubject(), weakTopic);
                });
            });
            root.querySelectorAll('[data-practice-topic]').forEach((button) => {
                button.addEventListener('click', () => {
                    openPracticeSetup(getPracticeSelectedSubject(), button.dataset.practiceTopic || '');
                });
            });
            root.querySelector('[data-open-setup-form]')?.addEventListener('click', () => {
                openPracticeSetup();
            });
            root.querySelector('[data-close-setup-form]')?.addEventListener('click', () => {
                practiceGymState.showSetupForm = false;
                renderPracticeGym();
            });
            root.querySelectorAll('[data-calendar-day]').forEach((button) => {
                button.addEventListener('click', () => {
                    practiceGymState.selectedCalendarDay = Number(button.dataset.calendarDay);
                    renderPracticeGym();
                });
            });
            root.querySelector('[data-close-day-sheet]')?.addEventListener('click', () => {
                practiceGymState.selectedCalendarDay = null;
                renderPracticeGym();
            });
            root.querySelectorAll('[data-usage-metric]').forEach((button) => {
                button.addEventListener('click', () => {
                    practiceGymState.usageMetric = button.dataset.usageMetric === 'minutes' ? 'minutes' : 'attempts';
                    renderPracticeGym();
                });
            });
            root.querySelector('[data-practice-review-mistakes]')?.addEventListener('click', () => {
                showAppToast('Latest mistakes are ready to review.');
            });
            root.querySelectorAll('[data-history-action]').forEach((button) => {
                button.addEventListener('click', () => {
                    const action = button.dataset.historyAction || 'Review';
                    if (action === 'Resume') {
                        openPracticeSetup(getPracticeSelectedSubject());
                    } else {
                        showAppToast(`${action} opened for ${getPracticeSelectedSubject()}.`);
                    }
                });
            });
            root.querySelectorAll('[data-gym-mode]').forEach((button) => {
                button.addEventListener('click', () => {
                    practiceGymState.mode = button.dataset.gymMode;
                    practiceGymState.pdfGenerated = false;
                    resetPracticeGymTest();
                    renderPracticeGym();
                });
            });
            root.querySelectorAll('[data-gym-field]').forEach((select) => {
                select.addEventListener('change', () => {
                    const field = select.dataset.gymField;
                    practiceGymState[field] = select.value;
                    practiceGymState.pdfGenerated = false;
                    if (field === 'grade') {
                        practiceGymState.subject = '';
                        practiceGymState.block = '';
                    }
                    if (field === 'subject') {
                        practiceGymState.block = '';
                    }
                    renderPracticeGym();
                });
            });
            root.querySelector('[data-gym-time]')?.addEventListener('input', (event) => {
                practiceGymState.timeLimit = GYM_TIME_OPTIONS[Number(event.target.value)] || 30;
                renderPracticeGym();
            });
            root.querySelectorAll('[data-gym-time-option]').forEach((button) => {
                button.addEventListener('click', () => {
                    practiceGymState.timeLimit = Number(button.dataset.gymTimeOption);
                    renderPracticeGym();
                });
            });
            root.querySelector('[data-gym-download-pdf]')?.addEventListener('click', () => {
                practiceGymState.pdfGenerated = true;
                renderPracticeGym();
            });
            root.querySelector('[data-gym-generate-another]')?.addEventListener('click', () => {
                practiceGymState.pdfGenerated = false;
                renderPracticeGym();
            });
            root.querySelectorAll('[data-gym-start-test]').forEach((button) => {
                button.addEventListener('click', () => {
                    if (isPracticeGymReady()) {
                        practiceGymState.showSetupForm = false;
                        startPracticeGymTest();
                    }
                });
            });
            root.querySelectorAll('[data-gym-answer]').forEach((button) => {
                button.addEventListener('click', () => {
                    practiceGymState.selected = Number(button.dataset.gymAnswer);
                    renderPracticeGym();
                    if (practiceGymState.testStarted && !practiceGymState.testDone) startPracticeGymTimer();
                });
            });
            root.querySelector('[data-gym-next]')?.addEventListener('click', () => {
                if (practiceGymState.selected === null || practiceGymState.selected === undefined) return;
                practiceGymState.answers.push(practiceGymState.selected);
                if (practiceGymState.currentQ + 1 >= practiceGymState.questions.length) {
                    practiceGymState.testDone = true;
                    stopPracticeGymTimer();
                } else {
                    practiceGymState.currentQ += 1;
                    practiceGymState.selected = null;
                }
                renderPracticeGym();
                if (practiceGymState.testStarted && !practiceGymState.testDone) startPracticeGymTimer();
            });
            root.querySelectorAll('[data-gym-reset]').forEach((button) => {
                button.addEventListener('click', () => {
                    resetPracticeGymTest();
                    renderPracticeGym();
                });
            });
        }

        function getStatus(progress) {
            if (progress >= 90) return 'Completed';
            if (progress > 0) return 'In Progress';
            return 'Not Started';
        }

        function getStatusClass(status) {
            if (status === 'Completed') return 'bg-[#4CAF50]/10 text-[#2E7D32] border-[#4CAF50]/20';
            if (status === 'In Progress') return 'bg-[#f59138]/10 text-[#b75d13] border-[#f59138]/20';
